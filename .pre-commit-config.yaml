repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]

  # Stock gitleaks scanning this repository's git history reported "no leaks found"
  # while a live HuggingFace token was present, so the repository ruleset is passed
  # explicitly rather than relying on the default one.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        args: ["--config", ".gitleaks.toml"]
