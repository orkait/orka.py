name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    name: structural gate (numpy only, no torch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: Package works without torch
        run: |
          if python -c "import torch" 2>/dev/null; then
            echo "torch is installed; this job must prove the numpy path needs no torch"
            exit 1
          fi
          orka --help > /dev/null
      - name: Structural pack gate
        run: |
          pip install pytest
          pytest tests/test_golden_oracle.py -q

  test:
    name: full suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e '.[dev,torch]' --extra-index-url https://download.pytorch.org/whl/cpu
      - run: pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check orka tests

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
